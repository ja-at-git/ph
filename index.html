
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="static/script.js" defer></script>
  </head>

  <body>
    <div id="containerPhone"> <!-- containerPhone start -->
  
      <div id="screen">
        <img id="picture">
        <div id="number"></div>
      </div>

      <div id="ContainerKeys"> <!-- ContainerKeys start -->
        <div class="row"> <!-- row 1 start -->
         <div id="1" class="key num">
           1
          </div>
         <div id="2" class="key num">
           2
          </div>
         <div id="3" class="key num">
           3
          </div>
        </div> <!-- row 1 end -->
      
        <div class="row"> <!-- row 2 start -->
         <div id="4" class="key num">
           4
          </div>
         <div id="5" class="key num">
           5
          </div>
         <div id="6" class="key num">
           6
          </div>
        </div> <!-- row 2 end -->
  
        <div class="row"> <!-- row 3 start -->
         <div id="7" class="key num">
           7
          </div>
         <div id="8" class="key num">
           8
          </div>
         <div id="9" class="key num">
           9
          </div>
        </div> <!-- row 3 end -->
  
        <div class="row"> <!-- row 4 start -->
         <div id="correct" class="key">
           C
          </div>
         <div id="0" class="key num"> 
           0
          </div>
         <div id="call" class="key">
           OK
          </div>
        </div> <!-- row 4 end -->
  
      </div> <!-- ContainerKeys end -->

    </div> <!-- containerPhone end -->

  </body>
</html>
